<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>System Calls — OS Emulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Specific overrides for System Calls */
    .proc-node {
      padding: 10px 16px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      display: inline-block;
      text-align: center;
      min-width: 120px;
      margin: 10px;
      transition: all 0.3s;
    }
    .proc-node.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
    }
    .proc-node.zombie {
      border-color: var(--warn);
      color: var(--warn);
      background: var(--bg);
      opacity: 0.6;
    }
    .proc-title { font-weight: 800; color: var(--ink); font-size: 1.1rem; }
    .proc-sub { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
    
    .tree-container {
      width: 100%; min-height: 250px;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px;
    }
    .tree-row {
      display: flex; gap: 20px; justify-content: center; width: 100%;
    }
    
    .sys-btn {
      width: 100%; justify-content: flex-start; margin-bottom: 8px;
    }
    .sys-btn code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
      background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── NAV ── -->
  <nav class="nav">
    <div class="nav-left">
      <p class="eyebrow"><a href="../index.html" style="color:inherit;text-decoration:none;">← Dashboard</a></p>
      <h1>System Calls Simulator</h1>
    </div>
    <span class="nav-badge" id="nav-label">MODULE_01</span>
  </nav>

  <!-- ── WORKSPACE ── -->
  <div class="workspace">

    <!-- LEFT: config -->
    <aside class="config-panel">

      <section class="config-section">
        <p class="section-label">Process Control</p>
        <button class="primary-btn anim-btn sys-btn" id="btn-fork"><code>fork()</code> Create Child Process</button>
        <button class="ghost-btn sys-btn" id="btn-exec" style="color:var(--safe); border-color:var(--safe-soft);"><code>exec()</code> Replace Process Image</button>
        <button class="ghost-btn sys-btn" id="btn-wait" style="color:var(--warn); border-color:var(--warn-soft);"><code>wait()</code> Wait for Child</button>
        <button class="ghost-btn sys-btn" id="btn-exit" style="color:var(--danger); border-color:var(--danger-soft);"><code>exit()</code> Terminate Process</button>
      </section>

      <section class="config-section">
        <p class="section-label">File Management (Active Proc)</p>
        <button class="ghost-btn sys-btn" id="btn-open"><code>open()</code> Open File</button>
        <button class="ghost-btn sys-btn" id="btn-read"><code>read()</code> Read from File</button>
        <button class="ghost-btn sys-btn" id="btn-write"><code>write()</code> Write to File</button>
        <button class="ghost-btn sys-btn" id="btn-close"><code>close()</code> Close File</button>
      </section>

      <section class="config-section">
        <div class="btn-stack">
          <button class="ghost-btn" id="btn-reset">Reset OS State</button>
        </div>
      </section>

    </aside>

    <!-- RIGHT: visualization -->
    <main class="viz-panel">

      <header class="viz-topbar">
        <div>
          <p class="eyebrow">Visualization</p>
          <h2 id="viz-title">Process Hierarchy</h2>
        </div>
        <span class="status-badge" id="sim-status" style="color:var(--safe)">RUNNING</span>
      </header>

      <div class="viz-body">
        
        <div class="viz-card">
          <p class="card-label">Process Tree</p>
          <div class="tree-container" id="tree-container">
            <!-- Process nodes injected here -->
          </div>
          <p style="text-align:center; font-size:0.8rem; color:var(--muted); margin-top:10px;">Click a process node to make it the Active Context for system calls.</p>
        </div>
        
        <!-- Detailed Log -->
        <div class="viz-card terminal-card">
          <div class="terminal-header">
            <p class="card-label">System Call Log (strace)</p>
          </div>
          <div class="terminal" id="terminal-log">
            <div class="log-info">&gt; OS Booted. Init process PID=1 running.</div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
